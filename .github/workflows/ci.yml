name: CI Framework Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project codebase[cite: 1]
      uses: actions/checkout@v3

    - name: Set up Python runtime environment[cite: 1]
      uses: actions/setup-python@v4
      with:
        python-node: '3.11'

    - name: Install software package dependencies[cite: 1]
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install psutil for monitoring test suite execution[cite: 1]
        pip install psutil

    - name: Install container browser binaries[cite: 1]
      run: |
        playwright install chromium
        playwright install-deps chromium

    - name: Execute automated unit test framework[cite: 1]
      run: |
        python -m unittest discover -s tests
